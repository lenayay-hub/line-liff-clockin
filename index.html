<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>百麒打卡中...</title>
  <!-- 載入 LINE LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding-top: 60px; background-color: #f4f6f9; color: #333; }
    .loader { border: 8px solid #f3f3f3; border-top: 8px solid #3b82f6; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 0 auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    h2 { color: #1e3a8a; margin-top: 30px; font-size: 20px; }
  </style>
</head>
<body>
  <div class="loader"></div>
  <h2 id="status">正在取得位置中...</h2>

  <script>
    // 固定的安全檢查金鑰
    const SECRET_KEY = "XuanBossSuperSecretKey2026";
    // ⚠️ 老闆注意：這裡要填入你之前設定在 Netlify 的那個 LIFF ID (通常是 201xxxxxxx-xxxxxxx 格式)
    const MY_LIFF_ID = "2010329159-Q4GS3m0W"; 

    liff.init({ liffId: MY_LIFF_ID }).then(() => {
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      
      // 取得網址列動作 (上班或下班)
      const action = new URLSearchParams(window.location.search).get('action') === 'out' ? "下班" : "上班";
      
      navigator.geolocation.getCurrentPosition(async (pos) => {
        let lat = pos.coords.latitude.toFixed(5);
        let lng = pos.coords.longitude.toFixed(5);
        let ts = new Date().getTime();
        
        // 計算安全雜湊碼
        let hash = await computeSHA256(action + lat + lng + ts + SECRET_KEY);
        let hashStr = hash.substring(0, 8);
        
        // 🚀 最關鍵的一步：直接傳送文字訊息到聊天室
        liff.sendMessages([{
          type: 'text',
          text: `【${action}打卡】,緯度:${lat},經度:${lng},時間:${ts},碼:${hashStr}`
        }]).then(() => {
          document.getElementById('status').innerText = "✅ 打卡指令已發送！";
          liff.closeWindow();
        }).catch(err => {
          alert("發送失敗: " + err);
        });
        
      }, (err) => {
        alert("無法獲取 GPS 定位，請確認權限已開啟！");
      }, { enableHighAccuracy: true });
    });

    // 安全加密運算
    async function computeSHA256(text) {
      const msgUint8 = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }
  </script>
</body>
</html>
